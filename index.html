<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />

  <title>果树品种查询</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, sans-serif
    }

    body {
      margin: 0;
      padding: 10px;
      background: #f7f7f7
    }

    .container {
      max-width: 900px;
      margin: 0 auto
    }

    .filter {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 1px 4px #0001;
      margin-bottom: 12px
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap
    }

    .filter-item {
      flex: 1;
      min-width: 120px
    }

    label {
      font-size: 14px;
      color: #333
    }

    select,
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px
    }

    .btn-reset {
      background: #eee;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer
    }

    .item {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px #0002;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: row;
      gap: 12px
    }

    .item-info {
      flex: 2
    }

    .item-imgs {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px
    }

    /* 懒加载专用：淡入效果，不突兀 */
    .item-img {
      width: 100%;
      aspect-ratio: 1;
      background: #eee;
      border-radius: 6px;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .item-img.loaded {
      opacity: 1;
    }

    h3 {
      margin: 0 0 4px 0;
      font-size: 16px
    }

    .prop {
      font-size: 14px;
      color: #555;
      margin: 2px 0
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #999
    }

    .info {
      white-space: pre-line;
    }

    @media(max-width:600px) {
      .item {
        flex-direction: column
      }
    }
  </style>
</head>

    function render() {
      const cate = document.getElementById('cate').value
      const month = document.getElementById('month').value
      const self = document.getElementById('self').value
      const hair = document.getElementById('hair').value
      const core = document.getElementById('core').value
      const stock = document.getElementById('stock').value
      const name = document.getElementById('name').value.trim().toLowerCase()


      const res = data.filter(i => {
        if (cate && i.cate !== cate) return false
        if (month && !i.month.includes(month)) return false
        if (self && i.self !== self) return false
        if (hair && i.hair !== hair) return false
        if (core && i.core !== core) return false
        if (stock && stock == "有" && i.stock == "0") return false
        if (stock && stock == "无" && i.stock !== "0") return false
        if (name && !i.name.toLowerCase().includes(name)) return false
        return true
      })

      const list = document.getElementById('list')
      if (res.length === 0) {
        list.innerHTML = '<div class="empty">暂无匹配品种</div>'
        return
      }

      // 👇 关键：把 src 改成 data-src（懒加载核心）
      list.innerHTML = res.map(item => `
    <div class="item">
      <div class="item-info">
        <h3>${item.name}</h3>
        <div class="prop">${item.cate}｜${item.month}成熟｜${item.self}｜${item.hair}｜${item.core} | 库存${item.stock}</div>
        <div class="prop info">${item.info}</div>
      </div>
      <div class="item-imgs">
        ${item.imgs.map(u => `<img data-src="${u}" class="item-img">`).join('')}
      </div>
    </div>
  `).join('')

      // 👇 执行懒加载
      lazyLoad()
    }

    // 👇 懒加载函数（丝滑版）
    function lazyLoad() {
      const imgs = document.querySelectorAll('img[data-src]')
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target
            img.src = img.dataset.src
            img.classList.add('loaded')
            observer.unobserve(img)
          }
        })
      })
      imgs.forEach(img => observer.observe(img))
    }

    function resetFilter() {
      document.getElementById('cate').value = ''
      document.getElementById('month').value = ''
      document.getElementById('self').value = ''
      document.getElementById('hair').value = ''
      document.getElementById('core').value = ''
      document.getElementById('stock').value = ''
      document.getElementById('name').value = ''
      render()
    }

    document.querySelectorAll('select').forEach(s => {
      s.addEventListener('change', render)
    })
    render()
  </script>
